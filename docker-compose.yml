services:
  redis:
    image: redis:7-alpine
    container_name: pulseguard-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: pulseguard-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI: http://localhost:15672 (pulseguard/pulseguard)
    environment:
      RABBITMQ_DEFAULT_USER: pulseguard
      RABBITMQ_DEFAULT_PASS: pulseguard
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
